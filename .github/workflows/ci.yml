name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: 1. Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d --wait
          echo "Broker is healthy and ready at http://localhost:9292"

      - name: 2. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test
        # Generates → citesting/target/pacts/POS-OMS.json

      - name: 3. Publish Pact to Broker
        working-directory: citesting
        run: |
          mvn pact:publish \
            -Dpact.broker.url=http://localhost:9292 \
            -Dpact.consumer.version=1.0.0-ci

      - name: 4. Start Mock Provider (WireMock)
        run: |
          mkdir -p mappings

          echo '{
            "request": {
              "method": "GET",
              "url": "/order/123"
            },
            "response": {
              "status": 200,
              "headers": {
                "Content-Type": "application/json"
              },
              "jsonBody": {
                "id": 123,
                "status": "CONFIRMED",
                "total": 42.0
              }
            }
          }' > mappings/order.json

          docker run -d --name mock-provider -p 4010:8080 \
            -v $(pwd)/mappings:/home/wiremock/mappings \
            wiremock/wiremock:3.3.1

          echo "Waiting for Mock Provider..."
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:4010/__admin/ >/dev/null; then
              echo "Mock Provider is ready!"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: 5. Run Pact Provider Verification
        working-directory: citesting
        run: mvn -Dtest=OmsProviderVerification test