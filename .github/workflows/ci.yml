name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: 1. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: 2. Publish Pact to Broker
        working-directory: citesting
        run: mvn pact:publish

      - name: 3. Start OMS Provider Application
        working-directory: citesting
        # Compiles and starts your Spring Boot / Java app in the background
        # Adjust this command if your app is started differently (e.g., java -jar)
        run: |
          mvn spring-boot:start & 
          echo "Waiting for OMS Provider to start on port 4010..."
          for i in {1..20}; do
            if curl -sf http://localhost:4010/health >/dev/null || curl -sf http://localhost:4010/ >/dev/null; then
              echo "OMS Provider is up!"
              exit 0
            fi
            sleep 3
          done
          echo "OMS Provider failed to start"
          exit 1

      - name: 4. Run Pact Provider Verification
        working-directory: citesting
        run: mvn -Dtest=OmsProviderVerification test