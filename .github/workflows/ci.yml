name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Install Pact CLI
        run: |
          curl -fsSL \
            https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz \
            | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      # Export CONTRACT_VERSION here so every subsequent step can use it.
      # $GITHUB_ENV persists variables across steps; a local `export` inside
      # one run: block is invisible to all other steps.
      - name: Set CONTRACT_VERSION
        run: echo "CONTRACT_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: 1. Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml down -v
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d --wait --wait-timeout 120

          # --wait checks the in-container healthcheck.
          # This curl loop confirms the port is reachable from the host runner.
          echo "Waiting for broker to be reachable on host..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:9292/diagnostic/status/heartbeat >/dev/null; then
              echo "Broker reachable at http://127.0.0.1:9292"; exit 0
            fi
            echo "Attempt $i/20 — retrying in 3s..."
            sleep 3
          done
          docker compose -f src/test/resources/docker-compose.pact-broker.yml logs
          exit 1

      # set +e prevents bash -e from exiting on the subshell assignment when
      # the command returns non-zero. set -e re-enables it immediately after
      # so all subsequent commands still fail fast on real errors.
      - name: 2. Create Production Environment
        run: |
          set +e
          OUTPUT=$(pact-broker create-environment \
            --name production \
            --display-name Production \
            --production \
            --broker-base-url http://127.0.0.1:9292 2>&1)
          EXIT=$?
          set -e

          echo "$OUTPUT"
          if [ $EXIT -ne 0 ]; then
            echo "$OUTPUT" | grep -q "already used" \
              && echo "::notice::Environment already exists — skipping." \
              || exit $EXIT
          fi

      - name: 3. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test
        # Generates → citesting/target/pacts/POS-OMS.json

      - name: 4. Publish Pact to Broker
        working-directory: citesting
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version=$CONTRACT_VERSION \
            --branch=main \
            --tag=week4 \
            --broker-base-url=http://127.0.0.1:9292

      - name: 5. Start Mock Provider (WireMock)
        run: |
          mkdir -p mappings
          echo '{
            "request": { "method": "GET", "url": "/order/123" },
            "response": {
              "status": 200,
              "headers": { "Content-Type": "application/json" },
              "jsonBody": { "id": 123, "status": "CONFIRMED", "total": 42.0 }
            }
          }' > mappings/order.json

          docker run -d --name mock-provider -p 4010:8080 \
            -v $(pwd)/mappings:/home/wiremock/mappings \
            wiremock/wiremock:3.3.1

          echo "Waiting for Mock Provider..."
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:4010/__admin/ >/dev/null; then
              echo "Mock Provider is ready!"; exit 0
            fi
            sleep 2
          done
          exit 1

      # -Dpactbroker.host/port override @PactBroker at runtime so the JVM
      # connects to 127.0.0.1 instead of resolving localhost → ::1 (IPv6).
      - name: 6. Run Pact Provider Verification + Publish Results
        working-directory: citesting
        run: |
          mvn -Dtest=OmsProviderVerification \
              -Dgit.sha=$CONTRACT_VERSION \
              -Dpactbroker.host=127.0.0.1 \
              -Dpactbroker.port=9292 \
              test

      # Record oms-provider BEFORE can-i-deploy pos-consumer.
      # can-i-deploy pos-consumer asks: "is the oms-provider that's live in
      # production compatible with this consumer?" — the answer is always
      # "unknown" until oms-provider is recorded as deployed here.
      - name: 7. Record Deployment (oms-provider)
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version $CONTRACT_VERSION \
            --environment production \
            --broker-base-url http://127.0.0.1:9292

      - name: 8. can-i-deploy Gate (pos-consumer)
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version $CONTRACT_VERSION \
            --to-environment production \
            --retry-while-unknown 3 \
            --retry-interval 10 \
            --broker-base-url http://127.0.0.1:9292

      - name: 9. Record Deployment (pos-consumer)
        run: |
          pact-broker record-deployment \
            --pacticipant pos-consumer \
            --version $CONTRACT_VERSION \
            --environment production \
            --broker-base-url http://127.0.0.1:9292

      - name: 10. can-i-deploy Gate (oms-provider)
        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version $CONTRACT_VERSION \
            --to-environment production \
            --retry-while-unknown 3 \
            --retry-interval 10 \
            --broker-base-url http://127.0.0.1:9292