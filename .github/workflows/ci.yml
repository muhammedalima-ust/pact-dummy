name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      # Needed for: pact-broker publish, can-i-deploy,
      # create-environment, record-deployment
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: 1. Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f pact-tests/docker-compose.pact-broker.yml up -d --wait --wait-timeout 120
          echo "Broker is healthy and ready at http://localhost:9292"

      # Creates the 'production' environment model in the broker.
      # Must exist before can-i-deploy and record-deployment can reference it.
      # Runs against a fresh broker each CI run, so no conflict.
      - name: 2. Create Production Environment
        run: |
          pact-broker create-environment \
            --name production \
            --display-name Production \
            --production \
            --broker-base-url http://localhost:9292

      - name: 3. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test
        # Generates → citesting/target/pacts/POS-OMS.json

      # Fixed: removed the duplicate '$ pact-broker' literal that was in the run block.
      # --consumer-app-version ties the pact to a git SHA so the broker Matrix works.
      # --branch=main feeds mainBranch() selector in OmsProviderVerification.
      - name: 4. Publish Pact to Broker
        working-directory: citesting
        run: |
          pact-broker publish target/pacts \
            --consumer-app-version="$(git rev-parse --short HEAD)" \
            --branch=main \
            --tag=week4 \
            --broker-base-url=http://localhost:9292

      - name: 5. Start Mock Provider (WireMock)
        run: |
          mkdir -p mappings
          echo '{
            "request": { "method": "GET", "url": "/order/123" },
            "response": {
              "status": 200,
              "headers": { "Content-Type": "application/json" },
              "jsonBody": { "id": 123, "status": "CONFIRMED", "total": 42.0 }
            }
          }' > mappings/order.json

          docker run -d --name mock-provider -p 4010:8080 \
            -v $(pwd)/mappings:/home/wiremock/mappings \
            wiremock/wiremock:3.3.1

          echo "Waiting for Mock Provider..."
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:4010/__admin/ >/dev/null; then
              echo "Mock Provider is ready!"; exit 0
            fi
            sleep 2
          done
          exit 1

      # -Dgit.sha is expanded by Surefire's <systemPropertyVariables> in pom.xml into:
      #   pact.verifier.publishResults=true
      #   pact.provider.version=$CONTRACT_VERSION
      #   pact.provider.branch=main
      # Raw -D flags on the mvn line won't reach the forked test JVM — Surefire must own them.
      - name: 6. Run Pact Provider Verification + Publish Results
        working-directory: citesting
        run: |
          export CONTRACT_VERSION=$(git rev-parse --short HEAD)
          mvn -Dtest=OmsProviderVerification -Dgit.sha=$CONTRACT_VERSION test

      # GATE — runs BEFORE any deploy, not after.
      # Checks the broker Matrix: is this consumer SHA compatible with what's live in production?
      # --retry-while-unknown waits for an in-flight verification to finish before deciding.
      # Non-zero exit code stops the pipeline here; nothing deploys.
      - name: 7. can-i-deploy Gate (pos-consumer)
        run: |
          pact-broker can-i-deploy \
            --pacticipant pos-consumer \
            --version $(git rev-parse --short HEAD) \
            --to-environment production \
            --retry-while-unknown 3 \
            --retry-interval 10 \
            --broker-base-url http://localhost:9292

      - name: 8. can-i-deploy Gate (oms-provider)
        run: |
          pact-broker can-i-deploy \
            --pacticipant oms-provider \
            --version $(git rev-parse --short HEAD) \
            --to-environment production \
            --retry-while-unknown 3 \
            --retry-interval 10 \
            --broker-base-url http://localhost:9292

      # record-deployment runs AFTER the gate passes.
      # It states a fact ("this version is now live"), it is not itself a gate.
      # This is what makes deployedOrReleased() selector work in future verification runs.
      - name: 9. Record Deployment (pos-consumer)
        run: |
          pact-broker record-deployment \
            --pacticipant pos-consumer \
            --version $(git rev-parse --short HEAD) \
            --environment production \
            --broker-base-url http://localhost:9292

      - name: 10. Record Deployment (oms-provider)
        run: |
          pact-broker record-deployment \
            --pacticipant oms-provider \
            --version $(git rev-parse --short HEAD) \
            --environment production \
            --broker-base-url http://localhost:9292