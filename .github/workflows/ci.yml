name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: 1. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9292/diagnostic/status/heartbeat >/dev/null; then
              echo "Pact Broker is ready"
              exit 0
            fi
            sleep 5
          done
          echo "=== Printing Broker Container Logs ==="
          docker compose -f src/test/resources/docker-compose.pact-broker.yml logs broker
          exit 1

      - name: 3. Start a Temporary Mock Provider (WireMock)
        run: |
          # Create a directory for mappings
          mkdir -p mappings
          
          # Create the exact endpoint the Pact file will look for
          echo '{
            "request": {
              "method": "GET",
              "url": "/order/123"
            },
            "response": {
              "status": 200,
              "headers": {
                "Content-Type": "application/json"
              },
              "jsonBody": {
                "id": 123,
                "status": "CONFIRMED",
                "total": 42.0
              }
            }
          }' > mappings/order.json

          # Spin up WireMock container in the background matching the port Pact expects (4010)
          docker run -d --name mock-provider -p 4010:8080 -v $(pwd)/mappings:/home/wiremock/mappings wiremock/wiremock:3.3.1
          
          # Wait until the mock server responds
          echo "Waiting for Mock Provider..."
          for i in {1..10}; do
            if curl -sf http://127.0.0.1:4010/__admin/ >/dev/null; then
              echo "Mock Provider is ready!"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: 4. Run Pact Provider Verification
        working-directory: citesting
        run: mvn -Dtest=OmsProviderVerification test