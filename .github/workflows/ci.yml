name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d
          for i in {1..30}; do
            if curl -sf http://localhost:9292/diagnostic/status/heartbeat >/dev/null; then
              echo "Pact Broker is ready"
              exit 0
            fi
            sleep 5
          done
          docker compose -f src/test/resources/docker-compose.pact-broker.yml ps
          exit 1

      - name: 1. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: 2. Publish Pact to Broker
        working-directory: citesting
        run: mvn pact:publish

      - name: 3. Run Pact Provider Verification
        working-directory: citesting
        # This triggers only the provider verification class
        run: mvn -Dtest=OmsProviderVerification test