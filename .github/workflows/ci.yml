name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: 1. Run Pact Consumer Tests
        working-directory: citesting
        run: mvn -Dtest=PosOmsConsumerPactTest test

      - name: Start Pact Broker
        working-directory: citesting
        run: |
          docker compose -f src/test/resources/docker-compose.pact-broker.yml up -d
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:9292/diagnostic/status/heartbeat >/dev/null; then
              echo "Pact Broker is ready"
              exit 0
            fi
            sleep 5
          done
          echo "=== Printing Broker Container Logs ==="
          docker compose -f src/test/resources/docker-compose.pact-broker.yml logs broker
          exit 1

      - name: 3. Start OMS Provider Application
        working-directory: citesting
        run: |
          # 1. Compile the project classes
          mvn compile

          # 2. Fire up the application using the Exec Maven Plugin in the background
          # IMPORTANT: Replace 'com.citesting.OmsApplication' with your actual main class path!
          mvn exec:java -Dexec.mainClass="com.citesting.OmsApplication" & 
          
          echo "Waiting for OMS Provider to start on port 4010..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:4010/health >/dev/null || curl -sf http://127.0.0.1:4010/ >/dev/null; then
              echo "OMS Provider is up!"
              exit 0
            fi
            sleep 3
          done
          echo "OMS Provider failed to start"
          exit 1

      - name: 4. Run Pact Provider Verification
        working-directory: citesting
        run: mvn -Dtest=OmsProviderVerification test